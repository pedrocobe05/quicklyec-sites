limit_req_zone $binary_remote_addr zone=api_general_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth_per_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_booking_per_ip:10m rate=10r/m;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.quicklyecsites.com;
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin-quicklyecsites.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-quicklyecsites.key;

    client_max_body_size 25m;
    client_body_timeout 30s;
    keepalive_timeout 30s;
    send_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ (^|/)\.(?!well-known/) {
        return 404;
    }

    location ~* (?:^|/).*\.(?:env|git|svn|hg|bak|backup|old|orig|save|swp|tmp|log|sql|ya?ml|toml|ini|conf)$ {
        return 404;
    }

    location = /api/auth/login {
        limit_req zone=api_auth_per_ip burst=5 nodelay;
        include /etc/nginx/snippets/quickly-sites-api-proxy.conf;
    }

    location = /api/auth/forgot-password {
        limit_req zone=api_auth_per_ip burst=3 nodelay;
        include /etc/nginx/snippets/quickly-sites-api-proxy.conf;
    }

    location = /api/auth/reset-password {
        limit_req zone=api_auth_per_ip burst=5 nodelay;
        include /etc/nginx/snippets/quickly-sites-api-proxy.conf;
    }

    location = /api/public/appointments {
        limit_req zone=api_booking_per_ip burst=5 nodelay;
        include /etc/nginx/snippets/quickly-sites-api-proxy.conf;
    }

    location / {
        limit_req zone=api_general_per_ip burst=60 nodelay;
        include /etc/nginx/snippets/quickly-sites-api-proxy.conf;
    }
}
